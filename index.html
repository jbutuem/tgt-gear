.cal-ev.equip{background:var(--orgb);color:var(--org);border-left:2px solid var(--org)}
.cal-legend{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:var(--txd)}
.cal-legend span{display:flex;align-items:center;gap:6px}
.cal-legend .dot{width:10px;height:10px;border-radius:3px}
.cal-legend .dot.prod{background:var(--red)}.cal-legend .dot.equip{background:var(--org)}
.cal-detail{margin-top:12px}
.cal-detail-card{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;margin-bottom:8px;border-left:3px solid var(--red)}
.cal-detail-card.equip-card{border-left-color:var(--org)}
.cal-detail-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.cal-detail-card p{font-size:12px;color:var(--txd)}
.cal-view-toggle{display:flex;gap:4px;background:var(--s2);border-radius:8px;padding:3px}

.cal-view-toggle button.ac{background:var(--red);color:#fff}
@media(max-width:500px){.cal-day{min-height:56px}.cal-ev{font-size:8px}}

</style>

async function loadData(){
  S.loading=true;R();
  const[eq,cat,prod,prof,hist]=await Promise.all([
    sb.from('equipment').select('*').order('name'),
    sb.from('categories').select('*').order('name'),
    sb.from('productions').select('*').order('start_date',{ascending:false}),
    sb.from('profiles').select('*').order('name'),
    sb.from('equipment_history').select('*').order('created_at',{ascending:false}).limit(50)
  ]);
  S.equipment=eq.data||[];S.categories=cat.data||[];S.productions=prod.data||[];S.profiles=prof.data||[];S.history=hist.data||[];
  if(S.productions.length){const{data:items}=await sb.from('production_items').select('*');S.productions.forEach(p=>{p._items=(items||[]).filter(i=>i.production_id===p.id)})}
  S.loading=false;R();
}

async function doLogin(){
  const e=document.getElementById('le').value,p=document.getElementById('lp').value;
  S.loading=true;R();
  const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){S.loading=false;document.getElementById('lerr').innerHTML='<div class="login-error">'+error.message+'</div>';return}
  S.user=data.user;const{data:pr}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  S.profile=pr;S.view='equipment';await loadData();
}
async function doLogout(){await sb.auth.signOut();S={...S,user:null,profile:null,view:'login',equipment:[],modal:null};R()}
async function checkSess(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;const{data:pr}=await sb.from('profiles').select('*').eq('id',session.user.id).single();S.profile=pr;S.view='equipment';await loadData()}
  R();
}

// ─── EQUIPMENT ACTIONS ───
async function doCheckout(eqId){
  const prod=document.getElementById('co-prod').value,df=document.getElementById('co-from').value,du=document.getElementById('co-until').value;
  await sb.from('equipment').update({status:'in_use'}).eq('id',eqId);
  if(prod){await sb.from('production_items').update({status:'checked_out',checkout_at:new Date().toISOString(),checkout_by:S.user.id,reserved_from:df||null,reserved_until:du||null}).eq('equipment_id',eqId).eq('production_id',prod)}
  await sb.from('equipment_history').insert({equipment_id:eqId,production_id:prod||null,action:'checkout',previous_status:'available',new_status:'in_use',performed_by:S.user.id,notes:df&&du?'Reservado: '+fmt(df)+' → '+fmt(du):null});
  toast('✓ Check-out realizado');S.modal=null;await loadData();
}
async function doCheckin(eqId){
  const cond=document.getElementById('ci-cond').value,notes=document.getElementById('ci-notes').value;
  await sb.from('equipment').update({status:'available',condition_notes:notes||null}).eq('id',eqId);
  await sb.from('equipment_history').insert({equipment_id:eqId,action:'checkin',previous_status:'in_use',new_status:'available',performed_by:S.user.id,notes:cond!=='ok'?(SL[cond]||cond)+(notes?': '+notes:''):notes||null});
  toast('✓ Devolvido');S.modal=null;await loadData();
}
async function doMaint(id,n){
  await sb.from('equipment').update({status:'maintenance',condition_notes:n}).eq('id',id);
  await sb.from('equipment_history').insert({equipment_id:id,action:'maintenance',previous_status:'available',new_status:'maintenance',performed_by:S.user.id,notes:n});
  toast('⚠️ Manutenção');S.modal=null;await loadData();
}
async function doFix(id){
  await sb.from('equipment').update({status:'available',condition_notes:null}).eq('id',id);
  await sb.from('equipment_history').insert({equipment_id:id,action:'status_change',previous_status:'maintenance',new_status:'available',performed_by:S.user.id,notes:'Liberado'});
  toast('✓ Liberado');S.modal=null;await loadData();
}
async function doClone(eq){
  const cnt=S.equipment.filter(e=>e.name===eq.name).length;
  const code=eq.internal_code.replace(/\d+$/,'')+String(parseInt(eq.internal_code.replace(/\D/g,'')||'0')+cnt).padStart(4,'0');
  const{error}=await sb.from('equipment').insert({category_id:eq.category_id,name:eq.name,internal_code:code,brand:eq.brand,model:eq.model,serial_number:null,location:eq.location,status:'available'});
  if(error){toast('Erro: '+error.message);return}toast('✓ Clonado: '+code);S.modal=null;await loadData();
}
async function doEditEq(id){

// ─── AGENDA / CALENDAR ───
function rAgenda(){
  const m=S.calMonth,y=S.calYear;
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dows=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  
  // Build calendar grid
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=new Date();const isToday=(d)=>today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
  
  // Collect events: productions + equipment reservations
  const events=[];
  S.productions.forEach(p=>{
    if(!p.start_date||!p.end_date)return;
    events.push({type:'prod',name:p.name,client:p.client,status:p.status,start:new Date(p.start_date),end:new Date(p.end_date),items:p._items||[],id:p.id,responsible:pN(p.responsible_id)});
  });
  
  // Get events for a specific day
  function eventsForDay(day){
    const d=new Date(y,m,day);
    return events.filter(e=>{
      const s=new Date(e.start.getFullYear(),e.start.getMonth(),e.start.getDate());
      const en=new Date(e.end.getFullYear(),e.end.getMonth(),e.end.getDate());
      return d>=s&&d<=en;
    });
  }
  
  let cells='';
  // Previous month padding
  for(let i=firstDay-1;i>=0;i--){cells+='<div class="cal-day other"><div class="cal-num">'+(prevDays-i)+'</div></div>';}
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const dayEvents=eventsForDay(d);
    const isSel=S.calSelDay===d;
    cells+='<div class="cal-day'+(isToday(d)?' today':'')+(isSel?' today':'')+'" onclick="S.calSelDay='+(isSel?'null':d)+';R()">';
    cells+='<div class="cal-num">'+d+'</div>';
    dayEvents.slice(0,3).forEach(e=>{
      cells+='<div class="cal-ev '+(e.type==='prod'?'prod':'equip')+'" title="'+e.name+'">'+e.name+'</div>';
    });
    if(dayEvents.length>3)cells+='<div style="font-size:9px;color:var(--txm);padding:0 4px">+'+(dayEvents.length-3)+' mais</div>';
    cells+='</div>';
  }
  // Next month padding
  const totalCells=firstDay+daysInMonth;const remaining=7-(totalCells%7);
  if(remaining<7){for(let i=1;i<=remaining;i++){cells+='<div class="cal-day other"><div class="cal-num">'+i+'</div></div>';}}
  
  // Selected day detail
  let detail='';
  if(S.calSelDay){
    const dayEv=eventsForDay(S.calSelDay);
    if(dayEv.length){
      detail='<div class="cal-detail"><div style="font-size:14px;font-weight:600;margin-bottom:10px">📅 '+S.calSelDay+' de '+months[m]+'</div>';
      dayEv.forEach(e=>{
        const eqList=(e.items||[]).map(i=>{const eq=S.equipment.find(x=>x.id===i.equipment_id);return eq?(ci(eq.category_id)+' '+eq.name):'—'}).join(', ');
        detail+='<div class="cal-detail-card'+(e.type==='equip'?' equip-card':'')+'" onclick="openProd(\''+e.id+'\')" style="cursor:pointer"><h4>'+e.name+'</h4><p>'+(e.client||'Interna')+' · <span class="ba ba-'+e.status+'">'+SL[e.status]+'</span></p><p>👤 '+e.responsible+' · '+fmt(e.start)+' → '+fmt(e.end)+'</p>'+(eqList?'<p style="margin-top:4px">📷 '+eqList+'</p>':'')+'</div>';
      });
      detail+='</div>';
    }else{
      detail='<div class="cal-detail"><div class="em" style="padding:24px"><div class="ei">📭</div><p>Nenhuma produção neste dia</p></div></div>';
    }
  }
  
  // Summary: upcoming productions
  const upcoming=events.filter(e=>e.start>=today||(e.start<=today&&e.end>=today)).sort((a,b)=>a.start-b.start).slice(0,5);
  let upcomingHtml='';
  if(!S.calSelDay&&upcoming.length){
    upcomingHtml='<div style="margin-top:16px"><div style="font-size:14px;font-weight:600;margin-bottom:10px">📋 Próximas produções</div>';
    upcoming.forEach(e=>{
      const eqCount=(e.items||[]).length;
      upcomingHtml+='<div class="cal-detail-card" onclick="openProd(\''+e.id+'\')" style="cursor:pointer"><h4>'+e.name+'</h4><p>'+(e.client||'Interna')+' · '+fmt(e.start)+' → '+fmt(e.end)+' · 📷 '+eqCount+' equip.</p></div>';
    });
    upcomingHtml+='</div>';
  }
  
  return'<div class="cal-header"><div class="pt">Agenda</div><div class="cal-nav"><button onclick="changeMonth(-1)">‹</button><div class="cal-month">'+months[m]+' '+y+'</div><button onclick="changeMonth(1)">›</button></div></div><div class="cal-legend"><span><span class="dot prod"></span>Produções</span><span><span class="dot equip"></span>Equip. reservados</span></div><div class="cal-grid">'+dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('')+cells+'</div>'+detail+upcomingHtml;
}

function changeMonth(dir){
  S.calMonth+=dir;S.calSelDay=null;
  if(S.calMonth>11){S.calMonth=0;S.calYear++}
  if(S.calMonth<0){S.calMonth=11;S.calYear--}
  R();
}

function mCheckout(eq){
  const ap=S.productions.filter(p=>p.status==='reserved'||p.status==='active');
  const today=new Date().toISOString().split('T')[0];
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Retirar</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><p style="margin-bottom:16px;color:var(--txd)"><strong>'+eq.name+'</strong> ('+eq.internal_code+')</p><div class="fg"><label>Produção (opcional)</label><select class="fi" id="co-prod"><option value="">— Sem vínculo —</option>'+ap.map(p=>'<option value="'+p.id+'">'+p.name+' ('+(p.client||'Interna')+')</option>').join('')+'</select></div><div class="frow"><div class="fg"><label>De</label><input type="date" class="fi" id="co-from" value="'+today+'"></div><div class="fg"><label>Até</label><input type="date" class="fi" id="co-until"></div></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doCheckout(\''+eq.id+'\')">Confirmar</button></div></div></div></div>';
}

function mCheckin(eq){
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Devolver</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><p style="margin-bottom:16px;color:var(--txd)"><strong>'+eq.name+'</strong></p><div class="fg"><label>Condição</label><select class="fi" id="ci-cond"><option value="ok">✅ OK</option><option value="weak_battery">🔋 Bateria fraca</option><option value="missing_cable">🔌 Cabo faltando</option><option value="noise">🔊 Ruído</option><option value="damaged">⚠️ Danificado</option><option value="needs_maintenance">🔧 Manutenção</option></select></div><div class="fg"><label>Obs</label><input type="text" class="fi" id="ci-notes" placeholder="Detalhe..."></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doCheckin(\''+eq.id+'\')">Confirmar</button></div></div></div></div>';
}

function mEditEq(eq){
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Editar Equipamento</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><div class="fg"><label>Nome</label><input class="fi" id="ee-name" value="'+eq.name+'"></div><div class="frow"><div class="fg"><label>Código TGT</label><input class="fi" id="ee-code" value="'+eq.internal_code+'"></div><div class="fg"><label>Nº Série</label><input class="fi" id="ee-serial" value="'+(eq.serial_number||'')+'"></div></div><div class="frow"><div class="fg"><label>Marca</label><input class="fi" id="ee-brand" value="'+(eq.brand||'')+'"></div><div class="fg"><label>Modelo</label><input class="fi" id="ee-model" value="'+(eq.model||'')+'"></div></div><div class="fg"><label>Local</label><input class="fi" id="ee-loc" value="'+(eq.location||'')+'"></div><div class="fg"><label>Obs</label><textarea class="fi" id="ee-notes">'+(eq.condition_notes||'')+'</textarea></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doEditEq(\''+eq.id+'\')">Salvar</button></div></div></div></div>';
}

function mAddEq(){
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Novo Equipamento</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><div class="fg"><label>Nome</label><input class="fi" id="ae-name" placeholder="Ex: Sony A7III"></div><div class="fg"><label>Categoria</label><select class="fi" id="ae-cat">'+S.categories.map(c=>'<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>').join('')+'</select></div><div style="margin-bottom:12px"><button class="btn bs bsm" onclick="S.modal={type:\'add-cat\'};R()" style="width:auto;font-size:12px">+ Nova categoria</button></div><div class="frow"><div class="fg"><label>Código TGT</label><input class="fi" id="ae-code" placeholder="TGT-00004"></div><div class="fg"><label>Nº Série</label><input class="fi" id="ae-serial" placeholder="Opcional"></div></div><div class="frow"><div class="fg"><label>Marca</label><input class="fi" id="ae-brand" placeholder="Sony"></div><div class="fg"><label>Modelo</label><input class="fi" id="ae-model" placeholder="A7III"></div></div><div class="fg"><label>Local</label><input class="fi" id="ae-loc" value="Estúdio TGT"></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doAddEq()">Cadastrar</button></div></div></div></div>';
}

function mAddCat(){
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Nova Categoria</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><div class="fg"><label>Nome</label><input class="fi" id="ac-name" placeholder="Ex: Drones"></div><div class="fg"><label>Ícone (emoji)</label><input class="fi" id="ac-icon" placeholder="🚁" value="📦"></div><div class="fma"><button class="btn bs" onclick="S.modal={type:\'add-eq\'};R()">Voltar</button><button class="btn bp" onclick="doAddCat()">Criar</button></div></div></div></div>';
}

function mProdDetail(p){
  const isA=S.profile?.role==='admin';const items=p._items||[];const j=ej(p);
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>'+p.name+'</h2><button class="mx" onclick="closeM()">✕</button></div><div class="ds"><h3>Informações</h3><div class="dr"><span class="lb">Cliente</span><span class="vl">'+(p.client||'Interno')+'</span></div><div class="dr"><span class="lb">Tipo</span><span class="vl">'+(p.type==='external'?'Externa':'Interna')+'</span></div><div class="dr"><span class="lb">Período</span><span class="vl">'+fmt(p.start_date)+' → '+fmt(p.end_date)+'</span></div><div class="dr"><span class="lb">Responsável</span><span class="vl">'+pN(p.responsible_id)+'</span></div><div class="dr"><span class="lb">Status</span><span class="vl"><span class="ba ba-'+p.status+'">'+SL[p.status]+'</span></span></div>'+(p.notes?'<div class="dr"><span class="lb">Obs</span><span class="vl">'+p.notes+'</span></div>':'')+'</div><div class="ds"><h3>Equipamentos ('+items.length+')</h3>'+items.map(i=>{const eq=S.equipment.find(e=>e.id===i.equipment_id);return'<div class="pe"><span class="pn">'+(eq?ci(eq.category_id)+' '+eq.name:'—')+'</span><span style="display:flex;gap:6px;align-items:center"><span class="ba ba-'+i.status+'">'+SL[i.status]+'</span>'+(isA?'<button class="btn bd bsm" style="width:28px;height:28px;padding:0;min-width:28px;font-size:12px" onclick="event.stopPropagation();doUnlinkEq(\''+i.id+'\')">✕</button>':'')+'</span></div>'+(i.reserved_from||i.reserved_until?'<div style="font-size:11px;color:var(--txd);margin:-4px 0 8px 12px">📅 '+fmt(i.reserved_from)+' → '+fmt(i.reserved_until)+'</div>':'')}).join('')+(isA?'<button class="btn bs bsm" onclick="S.modal={type:\'link-eq\',data:dj(\''+j+'\')};R()" style="margin-top:8px;width:100%">'+ic.lk+' Vincular equipamento</button>':'')+'</div>'+(isA?'<div class="da"><button class="btn bs bsm" onclick="S.modal={type:\'edit-prod\',data:dj(\''+j+'\')};R()">'+ic.ed+' Editar</button></div>':'')+'</div></div>';
}

function mAddProd(){
  const today=new Date().toISOString().split('T')[0];
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Nova Produção</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><div class="fg"><label>Nome da Produção</label><input class="fi" id="ap-name" placeholder="Ex: Sessão Kerry NIS"></div><div class="frow"><div class="fg"><label>Cliente</label><input class="fi" id="ap-client" placeholder="Ex: Kerry"></div><div class="fg"><label>Tipo</label><select class="fi" id="ap-type"><option value="external">Externa</option><option value="internal">Interna</option></select></div></div><div class="frow"><div class="fg"><label>Data Início</label><input type="date" class="fi" id="ap-from" value="'+today+'"></div><div class="fg"><label>Data Fim</label><input type="date" class="fi" id="ap-until"></div></div><div class="frow"><div class="fg"><label>Responsável</label><select class="fi" id="ap-resp">'+S.profiles.map(p=>'<option value="'+p.id+'"'+(p.id===S.user?.id?' selected':'')+'>'+p.name+'</option>').join('')+'</select></div><div class="fg"><label>Operador</label><select class="fi" id="ap-oper"><option value="">—</option>'+S.profiles.map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('')+'</select></div></div><div class="fg"><label>Obs</label><textarea class="fi" id="ap-notes" placeholder="Notas..."></textarea></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doAddProd()">Criar Produção</button></div></div></div></div>';
}

function mEditProd(p){
  const sf=p.start_date?new Date(p.start_date).toISOString().split('T')[0]:'';
  const su=p.end_date?new Date(p.end_date).toISOString().split('T')[0]:'';
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Editar Produção</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><div class="fg"><label>Nome</label><input class="fi" id="ep-name" value="'+p.name+'"></div><div class="frow"><div class="fg"><label>Cliente</label><input class="fi" id="ep-client" value="'+(p.client||'')+'"></div><div class="fg"><label>Tipo</label><select class="fi" id="ep-type"><option value="external"'+(p.type==='external'?' selected':'')+'>Externa</option><option value="internal"'+(p.type==='internal'?' selected':'')+'>Interna</option></select></div></div><div class="frow"><div class="fg"><label>Início</label><input type="date" class="fi" id="ep-from" value="'+sf+'"></div><div class="fg"><label>Fim</label><input type="date" class="fi" id="ep-until" value="'+su+'"></div></div><div class="fg"><label>Responsável</label><select class="fi" id="ep-resp">'+S.profiles.map(x=>'<option value="'+x.id+'"'+(x.id===p.responsible_id?' selected':'')+'>'+x.name+'</option>').join('')+'</select></div><div class="fg"><label>Status</label><select class="fi" id="ep-status"><option value="reserved"'+(p.status==='reserved'?' selected':'')+'>Reservada</option><option value="active"'+(p.status==='active'?' selected':'')+'>Ativa</option><option value="completed"'+(p.status==='completed'?' selected':'')+'>Concluída</option><option value="cancelled"'+(p.status==='cancelled'?' selected':'')+'>Cancelada</option></select></div><div class="fg"><label>Obs</label><textarea class="fi" id="ep-notes">'+(p.notes||'')+'</textarea></div><div class="fma"><button class="btn bs" onclick="closeM()">Cancelar</button><button class="btn bp" onclick="doEditProd(\''+p.id+'\')">Salvar</button></div></div></div></div>';
}

function mLinkEq(prod){
  const avail=S.equipment.filter(e=>e.status==='available');
  const sf=prod.start_date?new Date(prod.start_date).toISOString().split('T')[0]:'';
  const su=prod.end_date?new Date(prod.end_date).toISOString().split('T')[0]:'';
  return'<div class="mo" onclick="if(event.target===this)closeM()"><div class="ml"><div class="mh"><h2>Vincular Equipamento</h2><button class="mx" onclick="closeM()">✕</button></div><div class="mb"><p style="margin-bottom:16px;color:var(--txd)">Produção: <strong>'+prod.name+'</strong></p><div class="fg"><label>Equipamento</label><select class="fi" id="lk-eq"><option value="">Selecione...</option>'+avail.map(e=>'<option value="'+e.id+'">'+ci(e.category_id)+' '+e.name+' ('+e.internal_code+')</option>').join('')+'</select></div><div class="frow"><div class="fg"><label>De</label><input type="date" class="fi" id="lk-from" value="'+sf+'"></div><div class="fg"><label>Até</label><input type="date" class="fi" id="lk-until" value="'+su+'"></div></div><div class="fma"><button class="btn bs" onclick="openProd(\''+prod.id+'\')">Voltar</button><button class="btn bp" onclick="doLinkEq(\''+prod.id+'\')">Vincular</button></div></div></div></div>';
}

function rToast(){return S.toast?'<div class="to">'+S.toast+'</div>':''}

checkSess();
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.view==='login')doLogin()});
</script>
